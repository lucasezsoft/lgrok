# lgrok atrás de um nginx existente.
#
# Instale em /etc/nginx/sites-available/lgrok e ative com:
#   ln -s /etc/nginx/sites-available/lgrok /etc/nginx/sites-enabled/lgrok
#   nginx -t && systemctl reload nginx
#
# Os sites que você já tem continuam funcionando: o nginx casa server_name
# EXATO antes do wildcard, então só os subdomínios que não existem hoje
# chegam ao lgrok.

# Necessário para a conexão de controle do CLI (upgrade estilo websocket).
# Se você já tem um bloco 'map $http_upgrade' em outro arquivo, apague este.
map $http_upgrade $lgrok_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name lgrok.__LGROK_DOMAIN__ *.__LGROK_DOMAIN__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name lgrok.__LGROK_DOMAIN__ *.__LGROK_DOMAIN__;

    # Certificado wildcard (veja o README: certbot com desafio DNS-01)
    ssl_certificate     /etc/letsencrypt/live/__LGROK_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__LGROK_DOMAIN__/privkey.pem;

    client_max_body_size 0;   # sem limite de upload através do túnel

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        # $remote_addr (e não $proxy_add_x_forwarded_for): sobrescreve o header
        # em vez de acrescentar, senão um cliente forja o IP e escapa do
        # bloqueio do painel /admin.
        proxy_set_header X-Forwarded-For   $remote_addr;

        # Mantém o túnel (websocket/yamux) e streaming (SSE) vivos
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $lgrok_connection_upgrade;
        proxy_read_timeout  24h;
        proxy_send_timeout  24h;
        proxy_buffering     off;
    }
}
